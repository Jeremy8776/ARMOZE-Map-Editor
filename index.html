<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ARMOZE - Arma Reforger Map Overlay Zone Editor</title>
    <meta name="description" content="Visual zone editor for Arma Reforger. Draw zones and export to Workbench or scripts.">
    <meta name="keywords" content="Arma Reforger, Zone Editor, Map Overlay, Reforger Modding">
    <meta name="author" content="ARMOZE">
    <meta name="robots" content="index, follow">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://jeremy8776.github.io/Arma-Reforger-Map-Overlay-Zone-Editor/">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="logo-icon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/floating-controls.css">
    <link rel="stylesheet" href="css/properties.css">
    <link rel="stylesheet" href="css/zones.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="index.css">

    <!-- Data - Load before UI -->
    <script src="Maps/maps.js"></script>

    <style>
        /* Force Layout Reset - Prevents header drift */
        #app {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        .header {
            position: relative !important;
            top: 0 !important;
            display: flex !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="logo"><img src="logo-icon.svg" alt="ARMOZE" /></div>
                <h1>ARMOZE</h1>
                <a href="#" class="version" id="appVersionLink" target="_blank">v1.5.0 - MODULAR</a>
            </div>
            <div class="header-info">
                <div class="coords-display" id="coordsDisplay">
                    <span class="coord-label">X:</span><span id="coordX">0000</span>
                    <span class="coord-label">Y:</span><span id="coordY">0000</span>
                </div>
                <div class="map-info" id="mapInfo">No map loaded</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" id="btnUndo" title="Undo (Ctrl+Z)" disabled><i data-lucide="undo-2"></i></button>
                <button class="btn btn-secondary" id="btnRedo" title="Redo (Ctrl+Y)" disabled><i data-lucide="redo-2"></i></button>
                <div class="divider-vertical"></div>
                <button class="btn btn-secondary" id="btnSaveProject" title="Save Project (.json)"><i data-lucide="save"></i></button>
                <button class="btn btn-secondary" id="btnLoadProject" title="Load Project (.json)"><i data-lucide="folder-open"></i></button>
                <input type="file" id="projectInput" accept=".json" hidden>
                <button class="btn btn-primary" id="btnExport"><i data-lucide="download"></i>Export</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <aside class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="select" title="Select (V)"><i data-lucide="mouse-pointer-2"></i></button>
                    <button class="tool-btn" data-tool="pan" title="Pan (Space)"><i data-lucide="move"></i></button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)"><i data-lucide="square"></i></button>
                    <button class="tool-btn" data-tool="circle" title="Circle (C)"><i data-lucide="circle"></i></button>
                    <button class="tool-btn" data-tool="line" title="Line (L)"><i data-lucide="minus"></i></button>
                    <button class="tool-btn" data-tool="pen" title="Pen (P)"><i data-lucide="pen-tool"></i></button>
                    <button class="tool-btn" data-tool="freehand" title="Freehand (D)"><i data-lucide="pencil"></i></button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" id="btnZoomIn" title="Zoom In"><i data-lucide="zoom-in"></i></button>
                    <button class="tool-btn" id="btnZoomOut" title="Zoom Out"><i data-lucide="zoom-out"></i></button>
                    <button class="tool-btn" id="btnFitView" title="Fit (F)"><i data-lucide="maximize"></i></button>
                    <button class="tool-btn" id="btnToggleSnap" title="Snap (S)"><i data-lucide="grid"></i></button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" id="btnOpenExtractor" title="Texture Extractor (Ctrl+Shift+T)"><i data-lucide="package-search"></i></button>
                    <button class="tool-btn" id="btnShowHelp" title="Hotkeys & Help (?)"><i data-lucide="help-circle"></i></button>
                </div>
            </aside>

            <div class="main-view-column">
                <div class="tab-bar" id="tabBar"></div>
                <div class="canvas-container" id="canvasContainer">
                    <div class="upload-prompt" id="uploadPrompt">
                        <div class="upload-icon"><i data-lucide="map" style="width: 56px; height: 56px;"></i></div>
                        <h2>Load Your Map</h2>
                        <p>Upload an EDDS, PNG, or JPG file</p>
                        <button class="btn btn-primary btn-large" id="btnUpload">Choose File</button>
                        <input type="file" id="fileInput" accept=".edds,.dds,.png,.jpg" hidden>
                        
                        <div class="divider-horizontal"><span>OR SELECT LOCAL MAP</span></div>
                        
                        <div class="local-maps-section">
                            <div class="map-list" id="localMapList"></div>
                        </div>
                    </div>
                    <canvas id="mapCanvas"></canvas>
                    <div class="zoom-indicator" id="zoomIndicator">100%</div>
                </div>
            </div>

            <!-- Layer List -->
            <aside class="zone-panel">
                <div class="panel-section layers-section" id="layersSection">
                    <div class="panel-header"><h3>Layers</h3><span class="zone-count" id="zoneCount">0</span></div>
                    <div class="zone-list" id="zoneList"><div class="empty-state"><p>No zones yet</p></div></div>
                </div>
                <div class="panel-resizer" id="zonePanelResizer" aria-hidden="true"></div>
                <div class="panel-section zone-data-section" id="zoneDataSection">
                    <div class="panel-header"><h3>Data</h3></div>
                    <div class="zone-data-body">
                        <div id="zoneCoords" class="coords-info-glass">Select a layer to view its data.</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- UI Injections -->
    <div id="ui-modals"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/ui/ui-templates.js"></script>
    <script>
        // Inject Templates
        const modalContainer = document.getElementById('ui-modals');
        modalContainer.innerHTML = UITemplates.FLOATING_CONTROLS + 
                                 UITemplates.EXPORT_MODAL + 
                                 UITemplates.CALIBRATION_MODAL;
    </script>

    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/core/canvas-core.js"></script>
    <script src="js/core/event-handler.js"></script>
    <script src="js/zones/zone-manager.js"></script>
    <script src="js/zones/zone-renderer.js"></script>
    <script src="js/tools/select-tool.js"></script>
    <script src="js/tools/shape-tools.js"></script>
    <script src="js/tools/path-tools.js"></script>
    <script src="js/tools/tool-manager.js"></script>

    <!-- Services -->
    <script src="js/services/history-manager.js"></script>
    <script src="js/services/project-manager.js"></script>
    <script src="js/services/calibration-service.js"></script>
    <script src="js/services/file-handler.js"></script>
    <script src="js/services/hotkey-manager.js"></script>
    <script src="js/services/notification-service.js"></script>
    <script src="js/services/script-generator.js"></script>
    <script src="js/services/map-extractor-service.js"></script>

    <!-- UI -->
    <script src="js/ui/tab-manager.js"></script>
    <script src="js/ui/zone-list-ui.js"></script>
    <script src="js/ui/zone-properties-ui.js"></script>
    <script src="js/ui/toolbar-ui.js"></script>
    <script src="js/ui/map-browser-ui.js"></script>
    <script src="js/ui/map-extractor-ui.js"></script>

    <script src="js/export-handler.js"></script>
    <script src="js/context-menu.js"></script>
    <script src="js/app.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });</script>
</body>
</html>
